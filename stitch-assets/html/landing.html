<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CapstoneAI - Terminal Mono</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=Geist+Mono:wght@400&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffffff",
                        "background-light": "#ffffff",
                        "background-dark": "#0A0A0A",
                        "surface": "#0E0E0E",
                        "surface-highlight": "#1A1A1A",
                        "text-main": "#EDEDED",
                        "text-muted": "#666666",
                        "accent-success": "#FFFFFF",
                        "accent-warning": "#888888",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Geist", "sans-serif"],
                        "mono": ["Geist Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "md": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #0A0A0A;
            color: #EDEDED;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-mono {
            font-family: 'Geist Mono', monospace;
        }

        /* Sharp Panel Utility */
        .sharp-panel {
            background-color: #0E0E0E;
            border: 1px solid #333333;
        }

        /* Sharp Input Focus */
        .sharp-input:focus-within {
            border-color: #FFFFFF;
            background-color: #000000;
        }

        /* Terminal Pill Hover */
        .terminal-pill {
            transition: all 0.15s ease-in-out;
            border: 1px solid #333333;
            background-color: transparent;
        }
        .terminal-pill:hover {
            border-color: #FFFFFF;
            background-color: #FFFFFF;
            color: #000000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center relative antialiased selection:bg-white selection:text-black">
<main class="w-full max-w-[960px] px-6 flex flex-col items-center justify-center z-10">
<!-- Hero Title -->
<h1 class="font-display text-[48px] font-bold tracking-[-0.02em] leading-tight mb-10 text-transparent bg-clip-text bg-gradient-to-b from-white to-[#666666] text-center">
        Architect your capstone.
    </h1>
<!-- Master Input Container -->
<div class="w-full max-w-[640px] relative group">
<div class="sharp-panel sharp-input rounded-none flex items-center h-[56px] w-full px-4 transition-all duration-200">
<!-- Icon -->
<span aria-hidden="true" class="material-symbols-outlined text-text-muted mr-3 select-none" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">
                terminal
            </span>
<!-- Input Field -->
<input autocomplete="off" class="w-full bg-transparent border-none text-text-main text-[14px] placeholder:text-text-muted focus:ring-0 p-0 h-full font-mono outline-none" placeholder="What's your project idea?" type="text"/>
<!-- Enter Hint -->
<div class="ml-3 flex items-center justify-center pointer-events-none select-none opacity-40 group-focus-within:opacity-100 transition-opacity duration-200">
<span class="text-[11px] font-mono text-text-muted uppercase tracking-[0.05em] flex items-center gap-1 bg-white/5 px-2 py-1 rounded-none border border-white/10">
                    EXE 
                    <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 20;">keyboard_return</span>
</span>
</div>
</div>
</div>
<!-- Prompt Suggestions -->
<div class="flex flex-wrap justify-center gap-3 mt-8 max-w-[640px]">
<button class="terminal-pill rounded-none px-4 py-2 text-[13px] text-text-muted font-mono flex items-center gap-2 cursor-pointer outline-none focus:ring-1 focus:ring-white">
            AI-powered study planner
        </button>
<button class="terminal-pill rounded-none px-4 py-2 text-[13px] text-text-muted font-mono flex items-center gap-2 cursor-pointer outline-none focus:ring-1 focus:ring-white">
            IoT campus parking
        </button>
<button class="terminal-pill rounded-none px-4 py-2 text-[13px] text-text-muted font-mono flex items-center gap-2 cursor-pointer outline-none focus:ring-1 focus:ring-white">
            Blockchain voting system
        </button>
</div>
</main>
</body></html>
